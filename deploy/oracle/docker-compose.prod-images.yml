# Oracle VM deploy: pre-built backend/frontend images + MSSQL (all loaded via docker load, no pull on VM).
name: taskmanager-prod
services:
  database:
    image: mcr.microsoft.com/mssql/server:2019-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "127.0.0.1:1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -C -No 2>/dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    image: oracle-backend:latest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    environment:
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: "${APP_SECRET}"
      DATABASE_URL: "mssql://sa:${DB_PASSWORD}@database:1433/task_manager?TrustServerCertificate=yes"
      DB_HOST: database
      DB_PORT: "1433"
      DB_NAME: task_manager
      DB_USER: sa
      DB_PASSWORD: "${DB_PASSWORD}"
      JWT_PASSPHRASE: "${JWT_PASSPHRASE}"
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN}"
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: oracle-frontend:latest
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mssql_data:
