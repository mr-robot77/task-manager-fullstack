name: Smoke Test API

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Start backend stack for smoke test
        run: docker compose up --build -d database backend

      - name: Wait for MSSQL and prepare database
        run: |
          echo "Waiting for MSSQL (healthcheck start_period 30s)..."
          sleep 55
          docker compose exec -T backend php bin/console doctrine:database:create --if-not-exists
          docker compose exec -T backend php bin/console doctrine:schema:update --force
          docker compose exec -T backend php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Smoke test backend statistics endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/tasks/statistics >/tmp/backend_stats.json; then
              break
            fi
            sleep 2
          done
          test -s /tmp/backend_stats.json
          cat /tmp/backend_stats.json

      - name: Smoke test equipment statistics endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/equipment/statistics >/tmp/equipment_stats.json; then
              break
            fi
            sleep 2
          done
          test -s /tmp/equipment_stats.json
          cat /tmp/equipment_stats.json

      - name: Print service logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs backend --tail 100

      - name: Stop smoke test stack
        if: always()
        run: docker compose down -v
