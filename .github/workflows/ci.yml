name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl
          coverage: xdebug
          tools: composer

      - name: Install dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-progress --no-scripts --no-interaction

      - name: Check PHP syntax
        working-directory: ./backend
        run: find src -name "*.php" -exec php -l {} \;

      - name: Run backend tests
        working-directory: ./backend
        run: |
          mkdir -p coverage
          php vendor/bin/phpunit --testdox --coverage-clover coverage/backend-clover.xml

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/backend-clover.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linting
        working-directory: ./frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm run test:ci

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/task-manager-frontend

      - name: Build production
        working-directory: ./frontend
        run: npm run build -- --configuration=production

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t task-manager-backend ./backend

      - name: Build Frontend Docker Image
        run: docker build -t task-manager-frontend ./frontend

      - name: Build Streamlit Dashboard Docker Image
        run: docker build -t task-manager-dashboard ./streamlit-dashboard

      - name: Start backend stack for smoke test
        run: docker compose up --build -d database backend dashboard

      - name: Prepare backend database for smoke test
        run: |
          docker compose exec -T backend php bin/console doctrine:database:create --if-not-exists
          docker compose exec -T backend php bin/console doctrine:schema:update --force
          docker compose exec -T backend php bin/console lexik:jwt:generate-keypair --skip-if-exists

      - name: Smoke test backend statistics endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/api/tasks/statistics >/tmp/backend_stats.json; then
              break
            fi
            sleep 2
          done
          test -s /tmp/backend_stats.json
          cat /tmp/backend_stats.json

      - name: Smoke test Streamlit dashboard health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8501/_stcore/health; then
              break
            fi
            sleep 2
          done

      - name: Print service logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs backend --tail 100
          docker compose logs dashboard --tail 100

      - name: Stop smoke test stack
        if: always()
        run: docker compose down -v
