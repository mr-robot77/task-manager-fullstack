name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl, pdo_sqlite
          coverage: xdebug
          tools: composer

      - name: Install dependencies
        working-directory: ./backend
        run: composer install --prefer-dist --no-progress --no-scripts --no-interaction

      - name: Check PHP syntax
        working-directory: ./backend
        run: find src -name "*.php" -exec php -l {} \;

      - name: Run backend tests
        working-directory: ./backend
        run: |
          mkdir -p coverage
          php vendor/bin/phpunit --testdox --coverage-clover coverage/backend-clover.xml

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/backend-clover.xml
          if-no-files-found: warn

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Firefox for Karma
        uses: browser-actions/setup-firefox@v1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run linting
        working-directory: ./frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm run test:ci

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn

      - name: Build production
        working-directory: ./frontend
        run: npm run build -- --configuration=production

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build -t task-manager-backend ./backend

      - name: Build Frontend Docker Image
        run: docker build -t task-manager-frontend ./frontend
