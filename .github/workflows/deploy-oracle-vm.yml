name: Deploy to Oracle VM

# Builds images on GitHub, SCPs to VM, loads and runs. Uses PostgreSQL (1GB RAM).
# MSSQL needs 2GB+; Oracle Always Free has 1GB. Requires: ORACLE_VM_HOST, ORACLE_VM_USER, ORACLE_VM_SSH_KEY
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t oracle-backend:latest ./backend

      - name: Build frontend image
        run: |
          BUILD_VER=$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M)
          docker build --no-cache --build-arg BUILD_VERSION="$BUILD_VER" -t oracle-frontend:latest ./frontend

      - name: Pull PostgreSQL image
        run: docker pull postgres:15-alpine

      - name: Save images to tarball
        run: |
          docker save -o images.tar oracle-backend:latest oracle-frontend:latest postgres:15-alpine
          chmod a+r images.tar

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: mkdir -p ~/task-manager-fullstack/deploy/oracle

      - name: Copy images to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "images.tar"
          target: "~/"
          command_timeout: 20m

      - name: Copy deploy config to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "deploy/oracle/"
          target: "~/task-manager-fullstack/"
          strip_components: 0

      - name: Load images and start stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/task-manager-fullstack
            mkdir -p deploy/oracle
            [ -f deploy/oracle/.env.prod ] || cp deploy/oracle/.env.prod.example deploy/oracle/.env.prod 2>/dev/null || touch deploy/oracle/.env.prod
            COMPOSE_FILE="deploy/oracle/docker-compose.prod-pgsql.yml"
            [ -f "$COMPOSE_FILE" ] || COMPOSE_FILE="docker-compose.prod-pgsql.yml"
            [ -f "$COMPOSE_FILE" ] || { echo "ERROR: No compose file."; ls -laR; exit 1; }

            for cid in $(docker ps -q --filter "publish=4200" 2>/dev/null); do docker stop $cid; done || true
            for cid in $(docker ps -q --filter "publish=8000" 2>/dev/null); do docker stop $cid; done || true
            docker compose --env-file deploy/oracle/.env.prod -f "$COMPOSE_FILE" down || true

            docker load -i ~/images.tar
            docker compose --env-file deploy/oracle/.env.prod -f "$COMPOSE_FILE" up -d --force-recreate

            sleep 120
            docker compose --env-file deploy/oracle/.env.prod -f "$COMPOSE_FILE" exec -T backend php bin/console app:load-demo-data --no-interaction || true