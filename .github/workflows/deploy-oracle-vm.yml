name: Deploy to Oracle VM

# Builds images on GitHub (no Docker Hub needed on VM), SCPs to VM, loads and runs.
# Requires: ORACLE_VM_HOST, ORACLE_VM_USER, ORACLE_VM_SSH_KEY
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t oracle-backend:latest ./backend

      - name: Build frontend image
        run: |
          BUILD_VER=$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M)
          docker build --no-cache --build-arg BUILD_VERSION="$BUILD_VER" -t oracle-frontend:latest ./frontend

      - name: Pull MSSQL image
        run: |
          docker logout mcr.microsoft.com 2>/dev/null || true
          docker pull mcr.microsoft.com/mssql/server:2019-latest

      - name: Save images to tarball
        run: |
          docker save -o images.tar oracle-backend:latest oracle-frontend:latest mcr.microsoft.com/mssql/server:2019-latest
          chmod a+r images.tar

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: mkdir -p ~/task-manager-fullstack/deploy/oracle

      - name: Copy images to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "images.tar"
          target: "~/"
          command_timeout: 20m

      - name: Copy deploy config to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "deploy/oracle/"
          target: "~/task-manager-fullstack/"
          strip_components: 0

      - name: Load images and start stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/task-manager-fullstack
            mkdir -p deploy/oracle
            [ -f deploy/oracle/.env.prod ] || cp deploy/oracle/.env.prod.example deploy/oracle/.env.prod 2>/dev/null || touch deploy/oracle/.env.prod
            COMPOSE_FILE="deploy/oracle/docker-compose.prod-images.yml"
            [ -f "$COMPOSE_FILE" ] || COMPOSE_FILE="docker-compose.prod-images.yml"
            [ -f "$COMPOSE_FILE" ] || { echo "ERROR: No compose file. Listing:"; ls -laR; exit 1; }

            echo "=== Using compose file: $COMPOSE_FILE ==="

            echo "=== BEFORE: containers on port 4200 ==="
            docker ps -a --filter "publish=4200" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" || true

            echo "=== Stopping containers on port 4200 ==="
            for cid in $(docker ps -q --filter "publish=4200" 2>/dev/null); do docker stop $cid; done || true

            echo "=== Docker compose down ==="
            docker compose --env-file deploy/oracle/.env.prod -f "$COMPOSE_FILE" down || true

            echo "=== Loading images ==="
            docker load -i ~/images.tar
            docker images oracle-frontend:latest --format "{{.ID}} {{.CreatedAt}}"

            echo "=== Docker compose up (database needs ~90s to become healthy) ==="
            if ! docker compose --env-file deploy/oracle/.env.prod -f "$COMPOSE_FILE" up -d --force-recreate; then
              echo "=== Compose up failed. Database logs: ==="
              docker logs taskmanager-prod-database-1 --tail 50 2>&1 || true
              echo "=== Container status ==="
              docker ps -a --filter "name=taskmanager-prod" --format "table {{.Names}}\t{{.Status}}"
              exit 1
            fi

            echo "=== Waiting 180s for backend+frontend ==="
            sleep 180

            docker compose --env-file deploy/oracle/.env.prod -f "$COMPOSE_FILE" exec -T backend php bin/console app:load-demo-data --no-interaction || true

            echo "=== VERIFICATION ==="
            docker compose --env-file deploy/oracle/.env.prod -f "$COMPOSE_FILE" ps
            echo "--- HTML (first 20 lines) ---"
            curl -sS http://localhost:4200 2>/dev/null | head -20 || echo "curl failed"
            echo "--- Build fingerprint ---"
            (curl -sS http://localhost:4200 2>/dev/null | grep -o "Build: [^>]*" || echo "Build fingerprint NOT FOUND")
            echo "Deploy done."