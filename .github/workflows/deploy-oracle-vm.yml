name: Deploy to Oracle VM

# Builds images on GitHub (no Docker Hub needed on VM), SCPs to VM, loads and runs.
# Requires: ORACLE_VM_HOST, ORACLE_VM_USER, ORACLE_VM_SSH_KEY
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t oracle-backend:latest ./backend

      - name: Build frontend image
        run: |
          BUILD_VER=$(git rev-parse --short HEAD)-$(date +%Y%m%d%H%M)
          docker build --no-cache --build-arg BUILD_VERSION="$BUILD_VER" -t oracle-frontend:latest ./frontend

      - name: Pull MSSQL image
        run: |
          docker logout mcr.microsoft.com 2>/dev/null || true
          docker pull mcr.microsoft.com/mssql/server:2019-latest

      - name: Save images to tarball
        run: |
          docker save -o images.tar oracle-backend:latest oracle-frontend:latest mcr.microsoft.com/mssql/server:2019-latest
          chmod a+r images.tar

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: mkdir -p ~/task-manager-fullstack/deploy/oracle

      - name: Copy images to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "images.tar"
          target: "~/"
          command_timeout: 20m

      - name: Copy deploy config to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          source: "deploy/oracle/docker-compose.prod-images.yml,deploy/oracle/.env.prod.example"
          target: "~/task-manager-fullstack/deploy/oracle/"

      - name: Load images and start stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_HOST }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_VM_SSH_KEY }}
          script: |
            set -e
            cd ~/task-manager-fullstack
            [ -f deploy/oracle/.env.prod ] || cp deploy/oracle/.env.prod.example deploy/oracle/.env.prod

            echo "=== BEFORE: containers using port 4200 ==="
            docker ps -a --filter "publish=4200" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}" || true

            echo "=== Stopping any container on port 4200 ==="
            for cid in $(docker ps -q --filter "publish=4200"); do docker stop $cid; done || true

            echo "=== Docker compose down ==="
            docker compose --env-file deploy/oracle/.env.prod -f deploy/oracle/docker-compose.prod-images.yml down

            echo "=== Loading images ==="
            docker load -i ~/images.tar
            echo "=== oracle-frontend image after load ==="
            docker images oracle-frontend:latest --format "{{.ID}} {{.CreatedAt}}"

            echo "=== Docker compose up ==="
            docker compose --env-file deploy/oracle/.env.prod -f deploy/oracle/docker-compose.prod-images.yml up -d --force-recreate

            echo "=== Waiting 120s for backend ==="
            sleep 120

            docker compose --env-file deploy/oracle/.env.prod -f deploy/oracle/docker-compose.prod-images.yml exec -T backend php bin/console app:load-demo-data --no-interaction || true

            echo "=== VERIFICATION: docker ps ==="
            docker compose --env-file deploy/oracle/.env.prod -f deploy/oracle/docker-compose.prod-images.yml ps

            echo "=== VERIFICATION: curl localhost:4200 (first 15 lines) ==="
            curl -sS http://localhost:4200 2>/dev/null | head -15 || echo "curl failed"

            echo "=== VERIFICATION: Build fingerprint in HTML? ==="
            (curl -sS http://localhost:4200 2>/dev/null | grep -o "Build: [^>]*" || echo "Build fingerprint NOT FOUND")

            echo "Deploy done."